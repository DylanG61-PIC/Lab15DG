<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01//EN">
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AidData Donation Map</title>
<meta http-equiv="Content-Type" content="text/html; charset=us-ascii">

<style>
body{
  font-family: Arial, sans-serif;
  background:#f5f7fb;
}

h2{
  text-align:center;
}

svg{
  border:1px solid black;
  display:block;
  margin:auto;
}

.country{
  fill:#e8eef6;
  stroke:#888;
}

.donor{
  fill:#2a7de1;
  stroke:white;
  stroke-width:1.5;
  opacity:0.85;
}

.donor:hover{
  fill:orange;
}

#tooltip{
  box-shadow:0px 2px 6px rgba(0,0,0,0.3);
  border-radius:4px;
}
</style>

<script src="https://d3js.org/d3.v7.min.js"></script>
</head>

<body>

<h2>Global Aid Donations Map</h2>

<script>

const fetchData = async () => {
  try {

    const geoData = await d3.json(
      "https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson"
    );

    const data = await d3.csv("aiddata.csv");

    drawDotmap(geoData,data);

  } catch (error) {
    console.error("Error fetching data:", error);
  }
};


function drawDotmap(geoData,data){

data.forEach(d=>{
  d.commitment_amount_usd_constant=+d.commitment_amount_usd_constant;
  d.donor_lon=+d.donor_lon;
  d.donor_lat=+d.donor_lat;
  d.recipient_lon=+d.recipient_lon;
  d.recipient_lat=+d.recipient_lat;
});

const rollupData = d3.rollup(
  data,
  v=>{
    return{
      amount:d3.sum(v,d=>d.commitment_amount_usd_constant),
      donor_lon:v[0].donor_lon,
      donor_lat:v[0].donor_lat,
      recipients:v.map(d=>({
        country:d.recipient,
        lat:d.recipient_lat,
        lon:d.recipient_lon
      }))
    }
  },
  d=>d.donor
);

const rollupArray = Array.from(rollupData,([key,value])=>({
  donor:key,
  amount:value.amount,
  donor_lat:value.donor_lat,
  donor_lon:value.donor_lon,
  recipients:value.recipients
}));

const width=900;
const height=600;

const svg=d3.select("body")
.append("svg")
.attr("width",width)
.attr("height",height);

const g=svg.append("g");

const projection=d3.geoMercator()
.fitSize([width,height],geoData);

const path=d3.geoPath().projection(projection);

const radiusScale=d3.scaleSqrt()
.domain(d3.extent(rollupArray,d=>d.amount))
.range([3,22]);

const tooltip=d3.select("body")
.append("div")
.attr("id","tooltip")
.style("visibility","hidden")
.style("position","absolute")
.style("background","#fff")
.style("border","1px solid #000")
.style("padding","8px")
.style("font","12px sans-serif")
.style("pointer-events","none");


g.selectAll(".country")
.data(geoData.features.filter(d=>d.properties.ADMIN!=="Antarctica"))
.join("path")
.attr("class","country")
.attr("d",path);

const lineLayer=g.append("g").attr("class","flow-lines");
const donorLayer=g.append("g").attr("class","donors");
const recipientLayer=g.append("g").attr("class","recipients");


donorLayer
.selectAll("circle")
.data(rollupArray)
.join("circle")
.attr("class","donor")
.attr("cx",d=>projection([d.donor_lon,d.donor_lat])[0])
.attr("cy",d=>projection([d.donor_lon,d.donor_lat])[1])
.attr("r",d=>radiusScale(d.amount))

.on("mouseover",(event,d)=>{

tooltip
.style("visibility","visible")
.style("top",event.pageY+10+"px")
.style("left",event.pageX+10+"px")
.html(`<strong>${d.donor}</strong><br>Total Donation: $${d3.format(",")(d.amount)}`);

lineLayer
.selectAll("line")
.data(d.recipients)
.join("line")
.attr("x1",projection([d.donor_lon,d.donor_lat])[0])
.attr("y1",projection([d.donor_lon,d.donor_lat])[1])
.attr("x2",r=>projection([r.lon,r.lat])[0])
.attr("y2",r=>projection([r.lon,r.lat])[1])
.attr("stroke","#222")
.attr("stroke-opacity",0.3)
.attr("stroke-width",1);

recipientLayer
.selectAll("circle")
.data(d.recipients)
.join("circle")
.attr("cx",r=>projection([r.lon,r.lat])[0])
.attr("cy",r=>projection([r.lon,r.lat])[1])
.attr("r",2)
.attr("fill","#111")
.attr("opacity",0.65);

})

.on("mousemove",(event)=>{
tooltip
.style("top",event.pageY+10+"px")
.style("left",event.pageX+10+"px");
})

.on("mouseout",()=>{

tooltip.style("visibility","hidden");

lineLayer.selectAll("line").remove();

recipientLayer.selectAll("circle").remove();

});


const zoom=d3.zoom()
.scaleExtent([1,8])
.on("zoom",(event)=>{
g.attr("transform",event.transform);
});

svg.call(zoom);

}

fetchData();

</script>

</body>
</html>
